    <main class="container">

            <h1>Contact Us</h1>
            <p>Have a question, bug report, or suggestion? Fill in the form below and we'll reply within 24 hours.</p>

            <form id="contact-form" action="https://formspree.io/f/xkoyokar" method="POST">
                <input type="text"   name="name"    placeholder="Your name"     required>
                <input type="email"  name="email"   placeholder="Email address" required>
                <input type="text"   name="subject" placeholder="Subject"       required>
                <textarea            name="message" rows="5" placeholder="Your message" required></textarea>

                <input type="text" name="_gotcha" style="display:none">

                <div id="form-status" class="form-status hidden"></div>
                <button type="submit" class="btn btn-primary" id="contact-submit">Send Message</button>
            </form>
