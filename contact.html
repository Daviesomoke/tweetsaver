<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact the TweetSaver team for support or feedback.">
    <title>Contact - TweetSaver</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/" class="logo">TweetSaver</a>
            <nav class="nav-links" id="nav-menu">
                <a href="/">Home</a>
                <a href="/about.html">About</a>
                <a href="/contact.html">Contact</a>
            </nav>
            <div class="header-actions">
                <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                    <span class="hamburger"></span>
                </button>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark theme">
                    <span class="icon-toggle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </span>
                </button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <h1>Contact Us</h1>
            <p>Have a question or suggestion? Reach out and we'll reply within 24 hours.</p>
            <form id="contact-form">
                <input type="text" placeholder="Your name" required>
                <input type="email" placeholder="Email address" required>
                <textarea rows="4" placeholder="Message" required></textarea>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
            <p class="note">Or email directly: contact@tweetsaver.example.com</p>
        </div>
    </main>
    <footer class="main-footer container">
        <p>© 2025 TweetSaver</p>
    </footer>
    <script src="/script.js" defer></script>
</body>

</html>
