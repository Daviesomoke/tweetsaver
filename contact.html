<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact the TweetSaver team for support or feedback.">
    <title>Contact - TweetSaver</title>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/" class="logo">TweetSaver</a>
            <nav class="nav-links" id="nav-menu">
                <a href="/">Home</a>
                <a href="/about.html">About</a>
                <a href="/contact.html">Contact</a>
            </nav>
            <div class="header-actions">
                <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                    <span class="hamburger"></span>
                </button>
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle light/dark theme">
                    <span class="theme-icon-dark">☀️</span>
                    <span class="theme-icon-light">🌙</span>
                </button>
            </div>
        </div>
    </header>
    <main class="container">
        <div class="card">
            <h1>Contact Us</h1>
            <p>Have a question or suggestion? Reach out and we'll reply within 24 hours.</p>
            <form id="contact-form">
                <input type="text" placeholder="Your name" required>
                <input type="email" placeholder="Email address" required>
                <textarea rows="4" placeholder="Message" required></textarea>
                <button type="submit" class="btn btn-primary">Send Message</button>
            </form>
            <p class="note">Or email directly: contact@tweetsaver.example.com</p>
        </div>
    </main>
    <footer class="main-footer container">
        <p>© 2025 TweetSaver</p>
    </footer>
    <script src="/script.js" defer></script>
</body>

</html>
